# ══════════════════════════════════════════════════════════════════
# Configuración del fine-tuning (Laboratorio 4 — Sesión 4)
# Modelo: DistilBERT · Dataset: cornell-movie-review-data/rotten_tomatoes (sentimiento binario)
# ══════════════════════════════════════════════════════════════════

experiment_name: distilbert_rotten_tomatoes
seed: 42

model:
  checkpoint: distilbert/distilbert-base-uncased
  num_labels: 2
  id2label: {0: NEGATIVE, 1: POSITIVE}

data:
  dataset: cornell-movie-review-data/rotten_tomatoes
  max_length: 256           # truncation de secuencias largas
  # Para una demo rápida en clase, activar el subconjunto:
  quick_demo: false
  quick_train_size: 2500
  quick_eval_size: 500

training:
  learning_rate: 2.0e-5     # LR pequeño: NO destruir el conocimiento preentrenado
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  num_train_epochs: 3
  weight_decay: 0.01
  warmup_ratio: 0.1         # calentamiento del learning rate
  metric_for_best_model: macro_f1
  early_stopping_patience: 2

# Extensión PEFT/LoRA (demostrativa)
lora:
  r: 8                      # rango de las matrices de bajo rango
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: [q_lin, v_lin]   # específico de DistilBERT
